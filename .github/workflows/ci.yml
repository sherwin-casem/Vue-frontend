name: CI Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Activate Kendo UI license
        run: npx kendo-ui-license activate --key "${{ secrets.KENDO_UI_LICENSE }}"

      - name: Build app
        run: npm run build
