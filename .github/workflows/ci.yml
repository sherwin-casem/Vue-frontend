name: CI Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Generate .env.production
        run: |
          echo "VUE_APP_API_BASE_URL=${{ secrets.VUE_APP_API_BASE_URL }}" > .env.production
          echo "VUE_APP_API_LOGIN_ENDPOINT=/auth/login" >> .env.production
          echo "VUE_APP_API_LOGOUT_ENDPOINT=/auth/logout" >> .env.production
          echo "VUE_APP_API_ME_ENDPOINT=/auth/me" >> .env.production
          echo "NODE_ENV=production" >> .env.production

      - name: Activate Kendo UI license
        run: npx kendo-ui-license activate
        env:
          KENDO_UI_LICENSE: ${{ secrets.KENDO_UI_LICENSE }}

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -t ocpp-frontend .

      - name: Save Docker image
        run: docker save ocpp-frontend > ocpp-frontend.tar

      - name: Upload Docker image to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "ocpp-frontend.tar"
          target: "/home/${{ secrets.DEPLOY_USER }}/"

      - name: Deploy Docker container on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            docker load < ~/ocpp-frontend.tar
            docker stop ocpp-frontend || true
            docker rm ocpp-frontend || true
            docker run -d -it -p 80:80 ocpp-frontend
