name: CI Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Activate Kendo UI license
        run: npx kendo-ui-license activate
        env:
          KENDO_UI_LICENSE: ${{ secrets.KENDO_UI_LICENSE }}

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -t ocpp-frontend .

      - name: Save Docker image to tarball
        run: docker save ocpp-frontend > ocpp-frontend.tar

      - name: Copy Docker image to VirtualBox VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "ocpp-frontend.tar"
          target: "/home/${{ secrets.DEPLOY_USER }}/"

      - name: SSH into VM and load & run Docker image
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            docker load < /home/${{ secrets.DEPLOY_USER }}/ocpp-frontend.tar
            docker stop ocpp-frontend || true
            docker rm ocpp-frontend || true
            docker run -d -p 8080:80 --name ocpp-frontend ocpp-frontend
